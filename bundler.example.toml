# bundler.example.toml — copy to bundler.toml and fill in values.

# ── Network ───────────────────────────────────────────────────────────────
rpcUrl  = "https://mainnet.infura.io/v3/YOUR_KEY"
chainId = 1

# ── Protocol ──────────────────────────────────────────────────────────────
entryPoints = [
  "0x0000000071727De22E5E9d8BAf0edAc6f37da032",  # EntryPoint v0.7
]

# ── Policy ────────────────────────────────────────────────────────────────
# All ops must have an approved paymaster. The paymaster's on-chain logic
# enforces app-specific policy (target validation, rate limiting, etc.).
allowedPaymasters = [
  "0xYourPaymasterAddress",
]

# ── Gas bounds (sanity caps, not simulation) ──────────────────────────────
maxVerificationGas = 50_000
maxCallGas         = 500_000
maxBundleSize      = 10

# ── Mempool lifecycle ─────────────────────────────────────────────────────
pendingTtlMs = 1_800_000     # 30 minutes
retentionMs  = 604_800_000   # 7 days

# ── Hot key ───────────────────────────────────────────────────────────────
keystorePath    = "~/.bundler/keystore.json"
# expectedAddress = "0x..."  # optional; verified on startup

# ── Storage ───────────────────────────────────────────────────────────────
dbPath = "~/.bundler/bundler.db"

# ── Server ────────────────────────────────────────────────────────────────
listenAddr     = ":4337"
tickIntervalMs = 12_000       # 12 seconds (one Ethereum block)
